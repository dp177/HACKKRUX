services:
  - type: web
    name: hackkrux-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm start"
    
    # Auto-deploy on git push to main
    autoDeployOnPush: true
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables (set these in Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000
      
      - key: MONGODB_URI
        sync: false  # Keep your MongoDB connection in Render dashboard environment
      
      - key: JWT_SECRET
        sync: false  # IMPORTANT: Generate a new secret and set in Render dashboard
      
      - key: CORS_ORIGINS
        value: "https://your-frontend-domain.com,https://your-mobile-app-domain.com"
      
      - key: GOOGLE_OAUTH_CLIENT_IDS
        value: "(your-google-client-id.apps.googleusercontent.com)"
      
      - key: GOOGLE_CLIENT_SECRET
        sync: false  # Keep this secret in Render dashboard
      
      - key: GOOGLE_MOBILE_CALLBACK_URL
        sync: false  # Will be set to https://your-render-url.onrender.com/api/auth/google/mobile/callback

